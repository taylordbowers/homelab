site_name: Taylor's Homelab
site_description: A two-node Proxmox homelab running media, cloud, gaming, and self-hosted services.
site_url: https://taylordbowers.github.io/homelab
repo_url: https://github.com/taylordbowers/homelab
repo_name: taylordbowers/homelab
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - def_list

nav:
  - Home: index.md
  - Hardware:
    - Overview: hardware/index.md
    - pve-guide (Node 1): hardware/pve-guide.md
    - pve2 (Node 2): hardware/pve2.md
  - Infrastructure:
    - Storage: infrastructure/storage.md
    - Network: infrastructure/network.md
  - Services:
    - Media:
      - Jellyfin: services/media/jellyfin.md
      - The *arr Stack: services/media/arr-stack.md
      - Immich: services/media/immich.md
    - Cloud:
      - Nextcloud AIO: services/cloud/nextcloud.md
    - Network:
      - AdGuard Home: services/network/adguard.md
      - Nginx Proxy Manager: services/network/nginx-proxy-manager.md
      - Cloudflare DDNS: services/network/cloudflare-ddns.md
    - Management:
      - Proxmox: services/management/proxmox.md
      - Portainer: services/management/portainer.md
      - Homarr: services/management/homarr.md
    - Gaming:
      - Crafty Controller: services/gaming/crafty.md
      - AMP Game Server: services/gaming/amp.md
